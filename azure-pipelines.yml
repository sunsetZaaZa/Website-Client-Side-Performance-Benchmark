trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

parameters:
  - name: runPerfTests
    displayName: Run Docker-based performance suite
    type: boolean
    default: false

stages:
  - stage: Validate
    displayName: Validate project
    jobs:
      - job: Validate
        displayName: Validate, typecheck, and bundle k6
        pool:
          vmImage: ubuntu-latest
        timeoutInMinutes: 15
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: Use Node.js 20.x
            inputs:
              versionSpec: '20.x'

          - task: Cache@2
            displayName: Cache npm packages
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(Pipeline.Workspace)/.npm

          - script: npm ci --cache $(Pipeline.Workspace)/.npm --prefer-offline
            displayName: Install dependencies

          - script: npm run ci:verify
            displayName: Validate project

          - script: |
              mkdir -p dist/k6
              test -f dist/k6/load-test.js || echo "k6 bundle was not generated" > dist/k6/load-test.js
            displayName: Ensure k6 bundle artifact exists
            condition: always()

          - task: PublishPipelineArtifact@1
            displayName: Publish k6 bundle
            condition: always()
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/dist/k6/load-test.js'
              artifact: 'k6-bundle'
              publishLocation: 'pipeline'

  - stage: Performance
    displayName: Run performance suite
    dependsOn: Validate
    condition: and(succeeded(), eq(${{ parameters.runPerfTests }}, true))
    jobs:
      - job: DockerPerformance
        displayName: Docker k6 + Playwright performance run
        pool:
          vmImage: ubuntu-latest
        timeoutInMinutes: 45
        steps:
          - checkout: self

          - script: |
              docker --version
              docker compose version
            displayName: Confirm Docker Compose is available

          - script: mkdir -p results
            displayName: Prepare results directory

          - script: docker compose build perf-runner
            displayName: Build performance runner image

          - script: docker compose run --rm perf-runner
            displayName: Run performance suite

          - task: PublishPipelineArtifact@1
            displayName: Publish performance results
            condition: always()
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/results'
              artifact: 'performance-results'
              publishLocation: 'pipeline'
