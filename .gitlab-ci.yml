stages:
  - validate
  - performance

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

validate:
  stage: validate
  image: node:20-bookworm
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run ci:verify
  after_script:
    - mkdir -p dist/k6
    - test -f dist/k6/load-test.js || echo "k6 bundle was not generated" > dist/k6/load-test.js
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - dist/k6/load-test.js

performance:
  stage: performance
  image: docker:27-cli
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  needs:
    - validate
  before_script:
    - docker --version
    - docker compose version
    - mkdir -p results
  script:
    - docker compose build perf-runner
    - docker compose run --rm perf-runner
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - results/
  rules:
    - if: '$RUN_PERF_TESTS == "true"'
      when: on_success
    - when: manual
      allow_failure: false
