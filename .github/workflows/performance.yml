name: Performance CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_perf:
        description: Run the full Docker-based k6 + Playwright performance suite
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: performance-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate, typecheck, and bundle k6
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: npm run ci:verify

      - name: Ensure k6 bundle artifact exists
        if: always()
        run: |
          mkdir -p dist/k6
          test -f dist/k6/load-test.js || echo "k6 bundle was not generated" > dist/k6/load-test.js

      - name: Upload k6 bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-bundle
          path: dist/k6/load-test.js
          if-no-files-found: warn
          retention-days: 14

  performance:
    name: Run Docker performance suite
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 45
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_perf }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm Docker Compose is available
        run: |
          docker --version
          docker compose version

      - name: Prepare results directory
        run: mkdir -p results

      - name: Build performance runner image
        run: docker compose build perf-runner

      - name: Run performance suite
        run: docker compose run --rm perf-runner

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: results/
          if-no-files-found: warn
          retention-days: 14
